<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chan-Quiz</title>
    <link rel="stylesheet" href="Quiz.css">
</head>
<body>
    <button class="attempt">Attempt Quiz <span class="arrow">-></span></button>

    <h2 class="question-number">Question One</h2>
    <p class="question">Which of this best describes Effelento?</p>
    <div class="options">
        <label>
            <input type="radio" name = "question-1">cool
        </label>
        <label>
            <input type="radio" name = "question-1">nerd
        </label>
        <label>
            <input type="radio" name = "question-1">crazy
        </label>
        <label>
            <input type="radio" name = "question-1">funny
        </label>
    </div>
    <div class="response">
        <button class="submit">Save & Submit</button>
        <button class="reset">Reset</button>
    </div>
    <script src="Quiz.js"></script>
</body>
</html>
